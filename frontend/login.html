<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>WOWCRAB - Connexion</title>
        <style>
            *{box-sizing:border-box;margin:0;padding:0}
                body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f8;display:flex;align-items:center;justify-content:center;min-height:100vh}
                    .card{background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.10);padding:48px 40px 40px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center}
                        .logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px}
                            .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#e8f5e9 60%,#b2dfdb 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
                                .logo-name{font-size:26px;font-weight:800;color:#1a2233;letter-spacing:2px}
                                    .divider{width:100%;height:1px;background:#eee;margin:28px 0 24px}
                                        h2{font-size:20px;font-weight:600;color:#1a2233;margin-bottom:6px;align-self:flex-start}
                                            .subtitle{font-size:13px;color:#6b7a8d;margin-bottom:24px;align-self:flex-start}
                                                .form-group{width:100%;margin-bottom:18px}
                                                    label{display:block;font-size:13px;font-weight:500;color:#3d4a5c;margin-bottom:6px}
                                                        input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1.5px solid #dce1e9;border-radius:8px;font-size:14px;color:#1a2233;outline:none;background:#f9fafb;transition:border-color .2s}
                                                            input:focus{border-color:#2bbbad;background:#fff}
                                                                .btn-login{width:100%;padding:12px;background:#2bbbad;color:#fff;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:background .2s}
                                                                    .btn-login:hover{background:#229e92}
                                                                        .btn-login:disabled{background:#a0d4cf;cursor:not-allowed}
                                                                            .error-msg{width:100%;background:#fff0f0;border:1px solid #ffcccc;color:#cc0000;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
                                                                              </style>
<link rel="stylesheet" href="responsive.css"/>
                                                                              </head>
                                                                              <body>
                                                                                <div class="card">
                                                                                    <div class="logo-wrap">
                                                                                          <div class="logo-icon">&#x1F980;</div>
                                                                                                <span class="logo-name">WOWCRAB</span>
                                                                                                    </div>
                                                                                                        <div class="divider"></div>
                                                                                                            <h2>Connexion</h2>
                                                                                                                <p class="subtitle">Bienvenue ! Connectez-vous pour continuer.</p>
                                                                                                                    <div class="error-msg" id="errorMsg"></div>
                                                                                                                        <form style="width:100%" id="loginForm">
                                                                                                                              <div class="form-group">
                                                                                                                                      <label for="username">Nom d'utilisateur</label>
                                                                                                                                              <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur" required/>
                                                                                                                                                    </div>
                                                                                                                                                          <div class="form-group">
                                                                                                                                                                  <label for="password">Mot de passe</label>
                                                                                                                                                                          <input type="password" id="password" placeholder="Entrez votre mot de passe" required/>
                                                                                                                                                                                </div>
                                                                                                                                                                                      <button type="submit" class="btn-login" id="btnLogin">Se connecter</button>
                                                                                                                                                                                          </form>
                                                                                                                                                                                            </div>
                                                                                                                                                                                              <script>
                                                                                                                                                                                                  document.getElementById('loginForm').addEventListener('submit', async (e) => {
                                                                                                                                                                                                        e.preventDefault();
                                                                                                                                                                                                              const btn = document.getElementById('btnLogin');
                                                                                                                                                                                                                    const errorMsg = document.getElementById('errorMsg');
                                                                                                                                                                                                                          const username = document.getElementById('username').value.trim();
                                                                                                                                                                                                                                const password = document.getElementById('password').value;
                                                                                                                                                                                                                                      btn.disabled = true;
                                                                                                                                                                                                                                            btn.textContent = 'Connexion...';
                                                                                                                                                                                                                                                  errorMsg.style.display = 'none';
                                                                                                                                                                                                                                                        try {
                                                                                                                                                                                                                                                                const response = await fetch('/api/auth/login', {
                                                                                                                                                                                                                                                                          method: 'POST',
                                                                                                                                                                                                                                                                                    headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                              body: JSON.stringify({ username, password })
                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                              const data = await response.json();
                                                                                                                                                                                                                                                                                                                      if (response.ok && data.success) {
                                                                                                                                                                                                                                                                                                                                localStorage.setItem('token', data.token);
                                                                                                                                                                                                                                                                                                                                          localStorage.setItem('username', data.username);
                                                                                                                                                                                                                                                                                                                                                    window.location.href = '/dashboard.html';
                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                      errorMsg.textContent = data.message || 'Identifiants incorrects.';
                                                                                                                                                                                                                                                                                                                                                                                errorMsg.style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                          btn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                    btn.textContent = 'Se connecter';
                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                  } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                          errorMsg.textContent = 'Impossible de contacter le serveur.';
                                                                                                                                                                                                                                                                                                                                                                                                                                  errorMsg.style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                          btn.disabled = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                  btn.textContent = 'Se connecter';
                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                              </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              </html>
