function imgCellHtml(uuid,rowIdx){
  const img=uuid?'<img src="'+BI+uuid+'/thumb.webp" alt="" onerror="this.outerHTML=\'<span style=\"font-size:22px\">\ud83c\udf74</span>\'">':'<span class="no-img">\ud83c\udf74</span>';
  return '<div class="img-cell" onclick="triggerImgUpload(this,'+rowIdx+')" title="Cliquer pour changer la photo">'+img+'<div class="img-overlay"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div><input type="file" class="file-inp" accept="image/*"></div>';
}

function buildTable(){
  const tbody=document.getElementById('productBody');
  tbody.innerHTML=PRODUCTS.map(([name,cat,price,uuid],i)=>{
    const sN=name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const sC=cat.replace(/&/g,'&amp;');
    return '<tr data-name="'+sN.toLowerCase()+'" data-cat="'+sC+'"><td>'+imgCellHtml(uuid,i)+'</td><td class="pn">'+sN+'</td><td><span class="cat-badge">'+sC+'</span></td><td class="pp">'+price+'</td><td>-</td><td>1</td><td><button class="btn-edit" onclick="editProduct(this)">Edit</button> <button class="btn-delete" onclick="deleteProduct(this)">Delete</button></td></tr>';
  }).join('');
  filteredRows=Array.from(tbody.querySelectorAll('tr'));
  renderPage(1);
}

function triggerImgUpload(cell,idx){
  const inp=cell.querySelector('.file-inp');
  inp.onchange=function(){
    const file=this.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const imgEl=cell.querySelector('img')||cell.querySelector('.no-img');
      if(imgEl){imgEl.outerHTML='<img src="'+e.target.result+'" alt="" style="width:44px;height:44px;object-fit:cover;border-radius:6px;display:block">';}
      cell.title='Photo mise à jour';
    };
    reader.readAsDataURL(file);
    this.value='';
  };
  inp.click();
}

function renderPage(p){
  currentPage=p;
  const start=(p-1)*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,filteredRows.length);
  const tbody=document.getElementById('productBody');
  Array.from(tbody.querySelectorAll('tr')).forEach(r=>r.style.display='none');
  filteredRows.slice(start,end).forEach(r=>r.style.display='');
  const total=filteredRows.length;
  document.getElementById('infoBar').textContent=total===0?'No products found':'Showing '+(start+1)+'–'+end+' of '+total+' products';
  buildPagination();window.scrollTo(0,0);
}

function buildPagination(){
  const total=Math.ceil(filteredRows.length/PAGE_SIZE);
  const bar=document.getElementById('paginationBar');
  if(total<=1){bar.innerHTML='';return;}
  let h='<button class="page-btn" onclick="renderPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>&laquo;</button>';
  let s=Math.max(1,currentPage-2),e=Math.min(total,s+4);
  if(e-s<4)s=Math.max(1,e-4);
  for(let i=s;i<=e;i++)h+='<button class="page-btn '+(i===currentPage?'active':'')+'" onclick="renderPage('+i+')">'+i+'</button>';
  h+='<button class="page-btn" onclick="renderPage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>&raquo;</button>';
  bar.innerHTML=h;
}

function applyFilter(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const tbody=document.getElementById('productBody');
  filteredRows=Array.from(tbody.querySelectorAll('tr')).filter(r=>(!q||r.dataset.name.includes(q))&&(!cat||r.dataset.cat===cat));
  renderPage(1);
}

function openAddModal(){editRow=null;document.getElementById('modalTitle').textContent='New Product';['fName','fPrice','fSku'].forEach(id=>document.getElementById(id).value='');document.getElementById('fCategory').value='';document.getElementById('productModal').classList.add('open');}
function closeModal(){document.getElementById('productModal').classList.remove('open');}

function editProduct(btn){
  const row=btn.closest('tr');editRow=row;
  document.getElementById('modalTitle').textContent='Edit Product';
  document.getElementById('fName').value=row.querySelector('.pn').textContent;
  const cb=row.querySelector('.cat-badge');document.getElementById('fCategory').value=cb?cb.textContent:'';
  document.getElementById('fPrice').value=row.querySelector('.pp').textContent;
  const cells=row.querySelectorAll('td');document.getElementById('fSku').value=cells[4]?cells[4].textContent:'-';
  document.getElementById('productModal').classList.add('open');
}

function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const cat=document.getElementById('fCategory').value;
  const price=document.getElementById('fPrice').value.trim();
  const sku=document.getElementById('fSku').value.trim()||'-';
  if(!name){alert('Name is required');return;}
  if(editRow){
    editRow.querySelector('.pn').textContent=name;
    const cb=editRow.querySelector('.cat-badge');if(cb)cb.textContent=cat;
    editRow.querySelector('.pp').textContent=price;
    const cells=editRow.querySelectorAll('td');if(cells[4])cells[4].textContent=sku;
    editRow.dataset.name=name.toLowerCase();editRow.dataset.cat=cat;
    editRow.style.background='#f0fdf4';setTimeout(()=>{if(editRow)editRow.style.background='';},1500);
  }else{
    const tbody=document.getElementById('productBody');
    const nr=document.createElement('tr');nr.dataset.name=name.toLowerCase();nr.dataset.cat=cat;
    nr.innerHTML='<td><div class="img-cell" title="Cliquer pour changer la photo"><span class="no-img">\ud83c\udf74</span><div class="img-overlay"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div><input type="file" class="file-inp" accept="image/*"></div></td><td class="pn">'+name+'</td><td><span class="cat-badge">'+cat+'</span></td><td class="pp">'+price+'</td><td>'+sku+'</td><td>1</td><td><button class="btn-edit" onclick="editProduct(this)">Edit</button> <button class="btn-delete" onclick="deleteProduct(this)">Delete</button></td>';
    const imgCell=nr.querySelector('.img-cell');if(imgCell)imgCell.onclick=function(){triggerImgUpload(this,-1);};
    tbody.insertBefore(nr,tbody.firstChild);filteredRows.unshift(nr);renderPage(1);
  }
  closeModal();
}

function deleteProduct(btn){
  const row=btn.closest('tr');const name=row.querySelector('.pn').textContent;
  if(confirm('Delete "'+name+'"?')){filteredRows=filteredRows.filter(r=>r!==row);row.remove();renderPage(currentPage);}
}

document.addEventListener('DOMContentLoaded',buildTable);
</script>
